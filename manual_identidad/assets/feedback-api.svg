<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#FFFFFF"/>
  <text x="60" y="70" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="28" fill="#111827" font-weight="700">
    Feedback de UI frente a API
  </text>
  <text x="60" y="104" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="16" fill="#6B7280">
    Estados recomendados para formularios y acciones remotas
  </text>

  <!-- Three panels -->
  <g>
    <rect x="60" y="140" width="350" height="450" rx="18" fill="#F8FAFC" stroke="#E5E7EB"/>
    <text x="95" y="190" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="18" fill="#111827" font-weight="700">Cargando</text>
    <rect x="95" y="220" width="280" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="95" y="285" width="280" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="95" y="350" width="280" height="52" rx="26" fill="#84CC16"/>
    <circle cx="140" cy="376" r="6" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="160" cy="376" r="6" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="180" cy="376" r="6" fill="#FFFFFF" opacity="0.35"/>
    <text x="235" y="383" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="700">Guardando&</text>
    <text x="95" y="440" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="14" fill="#6B7280">
      Deshabilitar envío para evitar duplicados
    </text>
  </g>

  <g>
    <rect x="425" y="140" width="350" height="450" rx="18" fill="#F8FAFC" stroke="#E5E7EB"/>
    <text x="460" y="190" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="18" fill="#111827" font-weight="700">Éxito</text>
    <rect x="460" y="220" width="280" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="460" y="285" width="280" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="460" y="350" width="280" height="52" rx="26" fill="#84CC16"/>
    <text x="600" y="383" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="700">Guardar</text>
    <rect x="460" y="420" width="280" height="54" rx="12" fill="#ECFCCB" stroke="#E5E7EB"/>
    <text x="480" y="452" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="14" fill="#111827">
      Cambios guardados correctamente
    </text>
  </g>

  <g>
    <rect x="790" y="140" width="350" height="450" rx="18" fill="#F8FAFC" stroke="#E5E7EB"/>
    <text x="825" y="190" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="18" fill="#111827" font-weight="700">Error</text>
    <rect x="825" y="220" width="280" height="48" rx="10" fill="#FFFFFF" stroke="#EF4444" stroke-width="2"/>
    <text x="825" y="285" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="14" fill="#EF4444">
      Revisa este campo
    </text>
    <rect x="825" y="320" width="280" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="825" y="385" width="280" height="52" rx="26" fill="#84CC16"/>
    <text x="965" y="418" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="700">Reintentar</text>
    <rect x="825" y="455" width="280" height="70" rx="12" fill="#FFFFFF" stroke="#EF4444"/>
    <text x="845" y="488" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="14" fill="#111827">
      No se pudo guardar. Intenta de nuevo.
    </text>
    <text x="845" y="510" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="13" fill="#6B7280">
      Si persiste, revisa la conexión.
    </text>
  </g>
</svg>
