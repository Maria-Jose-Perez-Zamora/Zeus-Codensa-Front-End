<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#FFFFFF"/>
  <text x="60" y="70" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="28" fill="#111827" font-weight="700">
    Botones y estados
  </text>
  <text x="60" y="104" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="16" fill="#6B7280">
    Convención de interacción para acciones críticas y secundarias
  </text>

  <!-- Card container -->
  <rect x="60" y="140" width="1080" height="450" rx="18" fill="#F8FAFC" stroke="#E5E7EB"/>

  <!-- Primary button states -->
  <text x="110" y="195" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="18" fill="#111827" font-weight="700">Primario</text>

  <!-- Rest -->
  <rect x="110" y="215" width="260" height="52" rx="26" fill="#84CC16"/>
  <text x="240" y="248" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="700">Continuar</text>
  <text x="110" y="290" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#6B7280">Reposo</text>

  <!-- Hover -->
  <rect x="410" y="215" width="260" height="52" rx="26" fill="#76B814"/>
  <text x="540" y="248" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="700">Continuar</text>
  <text x="410" y="290" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#6B7280">Hover</text>

  <!-- Focus -->
  <rect x="710" y="215" width="260" height="52" rx="26" fill="#84CC16"/>
  <rect x="702" y="207" width="276" height="68" rx="34" fill="none" stroke="#111827" stroke-width="2"/>
  <text x="840" y="248" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="700">Continuar</text>
  <text x="710" y="290" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#6B7280">Focus</text>

  <!-- Disabled -->
  <rect x="110" y="330" width="260" height="52" rx="26" fill="#84CC16" opacity="0.45"/>
  <text x="240" y="363" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="700" opacity="0.9">Continuar</text>
  <text x="110" y="405" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#6B7280">Disabled</text>

  <!-- Loading -->
  <rect x="410" y="330" width="260" height="52" rx="26" fill="#84CC16"/>
  <circle cx="470" cy="356" r="6" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="490" cy="356" r="6" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="510" cy="356" r="6" fill="#FFFFFF" opacity="0.35"/>
  <text x="565" y="363" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="700">Enviando&</text>
  <text x="410" y="405" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#6B7280">Cargando</text>

  <!-- Secondary -->
  <text x="110" y="460" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="18" fill="#111827" font-weight="700">Secundario</text>
  <rect x="110" y="480" width="260" height="52" rx="26" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="240" y="513" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="16" fill="#111827" font-weight="700">Cancelar</text>
  <text x="110" y="555" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#6B7280">Borde #E5E7EB</text>
</svg>
