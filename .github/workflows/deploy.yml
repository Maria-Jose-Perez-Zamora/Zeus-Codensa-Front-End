name: Backend CI/CD

on:
  push:
    branches:
      - develop
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DB_HOST: ${{ secrets.DB_QA_HOST }}
      DB_PORT: ${{ secrets.DB_QA_PORT }}
      DB_NAME: ${{ secrets.DB_QA_NAME }}
      DB_USER: ${{ secrets.DB_QA_USER }}
      DB_PASSWORD: ${{ secrets.DB_QA_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build project
        run: mvn clean install

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
